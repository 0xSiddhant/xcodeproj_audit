name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Tag · Version · Build · Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:

      # ── 1. Checkout full history so we can read all tags ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Compute next tag from commit message (Conventional Commits) ────────
      - name: Compute next version
        id: version
        run: |
          # Get latest tag, default to 0.0.0 if none exists
          LATEST=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi

          echo "Previous tag: $LATEST"

          MAJOR=$(echo $LATEST | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # Read the full commit message (%B covers both subject and body).
          # This handles both squash merges (PR title is subject) and regular
          # merge commits (PR title appears in the body after "Merge pull request").
          COMMIT_MSG=$(git log -1 --format=%B | grep -v '^Merge pull request' | grep -v '^\s*$' | grep -v '^\[skip ci\]' | grep -v '^chore: bump version' | head -n1)
          echo "Commit message: $COMMIT_MSG"

          # Determine bump type:
          #   feat! or BREAKING CHANGE → major
          #   feat                     → minor
          #   anything else            → patch
          if echo "$COMMIT_MSG" | grep -qE '^[a-z]+(\([^)]+\))?!:' || echo "$COMMIT_MSG" | grep -q 'BREAKING CHANGE'; then
            NEXT_VERSION="$((MAJOR + 1)).0.0"
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\([^)]+\))?:'; then
            NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "previous=$LATEST"      >> $GITHUB_OUTPUT

      # ── 3. Update version string inside source code ────────────────────────
      - name: Bump version in source
        run: |
          VERSION=${{ steps.version.outputs.version }}
          FILE="Sources/explorer/xcodeproj_audit.swift"

          # Replaces: version: "x.y.z"  →  version: "$VERSION"
          # Works with any previous version string
          sed -i '' \
            "s/version: \"[0-9]*\.[0-9]*\.[0-9]*\"/version: \"$VERSION\"/" \
            "$FILE"

          echo "Updated $FILE to version $VERSION"
          cat "$FILE" | grep "version:"

      # ── 4. Commit the version bump back to main ────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Sources/explorer/xcodeproj_audit.swift
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      # ── 5. Create and push the new tag ─────────────────────────────────────
      - name: Create tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      # ── 6. Build universal release binary (arm64 + x86_64) ───────────────────
      - name: Build
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create -output xcodeproj_audit \
            .build/arm64-apple-macosx/release/xcodeproj_audit \
            .build/x86_64-apple-macosx/release/xcodeproj_audit
          lipo -info xcodeproj_audit
          ls -lh xcodeproj_audit

      # ── 7. Zip the binary ──────────────────────────────────────────────────
      - name: Zip binary
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip "xcodeproj_audit-$VERSION-macos.zip" xcodeproj_audit
          echo "artifact=xcodeproj_audit-$VERSION-macos.zip" >> $GITHUB_ENV

      # ── 8. Create GitHub Release and upload artifact ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## xcodeproj_audit v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            # Install to /usr/local/bin (requires sudo)
            curl -fsSL https://raw.githubusercontent.com/0xSiddhant/xcodeproj_audit/main/install.sh | sudo bash

            # Install to ~/.local/bin (no sudo)
            curl -fsSL https://raw.githubusercontent.com/0xSiddhant/xcodeproj_audit/main/install.sh | bash -s -- --user
            ```

            ### Run
            ```bash
            xcodeproj_audit --path ./MyApp.xcodeproj --generate-dashboard-report
            ```
          files: ${{ env.artifact }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}